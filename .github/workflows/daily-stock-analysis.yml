name: 📈 Daily KOSPI Stock Analysis

on:
  schedule:
    # 매일 16:00 KST (UTC 07:00) — 장마감(15:30) 후 30분 뒤
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run stock analysis & send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/analyze_stock.py

      - name: Save analysis result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: warn
