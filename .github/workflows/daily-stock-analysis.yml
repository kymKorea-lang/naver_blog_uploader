name: 📈 Daily KOSPI Stock Analysis

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chrome + matching ChromeDriver (버전 자동 일치)
        run: |
          # 기존 Chrome 완전 제거
          sudo apt-get remove -y google-chrome-stable chromium-browser || true
          sudo apt-get autoremove -y || true

          # Chrome 149 고정 설치 (ChromeDriver와 버전 맞춤)
          wget -q https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_149.0.7827.0-1_amd64.deb 2>/dev/null \
            || echo "149 다운로드 실패, 최신버전 설치"

          # 최신 안정 Chrome 설치
          wget -q -O /tmp/chrome.deb \
            "https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb"
          sudo apt-get install -y /tmp/chrome.deb

          # 설치된 Chrome 버전 확인
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          CHROME_MAJOR=$(echo $CHROME_VERSION | cut -d. -f1)
          echo "Chrome 버전: $CHROME_VERSION (major: $CHROME_MAJOR)"
          echo "CHROME_MAJOR=$CHROME_MAJOR" >> $GITHUB_ENV

          # Chrome 버전에 맞는 ChromeDriver 다운로드
          # Chrome 115+ 는 새 CfT(Chrome for Testing) 엔드포인트 사용
          DRIVER_URL="https://storage.googleapis.com/chrome-for-testing-public/${CHROME_VERSION}/linux64/chromedriver-linux64.zip"
          echo "ChromeDriver URL: $DRIVER_URL"

          wget -q -O /tmp/chromedriver.zip "$DRIVER_URL" \
            || wget -q -O /tmp/chromedriver.zip \
               "https://storage.googleapis.com/chrome-for-testing-public/$(curl -s https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_STABLE)/linux64/chromedriver-linux64.zip"

          unzip -q /tmp/chromedriver.zip -d /tmp/
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver

          echo "ChromeDriver 버전: $(chromedriver --version)"

      - name: Install system dependencies
        run: |
          sudo apt-get install -y -qq \
            xvfb \
            fonts-nanum \
            fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run stock analysis & blog upload & send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PW: ${{ secrets.NAVER_PW }}
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1366x768x24 &
          sleep 2
          python scripts/analyze_stock.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots-${{ github.run_number }}
          path: /tmp/screenshots/
          retention-days: 7

      - name: Save analysis result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-analysis-${{ github.run_number }}
          path: output/
          retention-days: 30
